<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="山枢庭 SST 提供统一的 AI API 入口，将接入、计量、账册与稳定供给整理在同一套长期可维护的服务中。" />
    <meta name="robots" content="index,follow" />
    <title>山枢庭 - 统一入口，安静流转。</title>
    <script nonce="__CSP_NONCE_VALUE__">
      ;(() => {
        const lightBackground = '#f4efe4'
        const darkBackground = '#11130f'
        const lightText = '#1f2320'
        const darkText = '#f4efe4'

        try {
          const savedTheme = localStorage.getItem('theme')
          const followsSystem = !savedTheme || savedTheme === 'system'
          const isDark = savedTheme === 'dark'
            || (followsSystem && window.matchMedia('(prefers-color-scheme: dark)').matches)
          const root = document.documentElement
          const backgroundColor = isDark ? darkBackground : lightBackground

          root.classList.toggle('dark', isDark)
          root.style.backgroundColor = backgroundColor
          root.style.colorScheme = isDark ? 'dark' : 'light'
          root.style.color = isDark ? darkText : lightText

          document.addEventListener('DOMContentLoaded', () => {
            document.body.style.backgroundColor = backgroundColor
            document.body.style.colorScheme = isDark ? 'dark' : 'light'
            document.body.style.color = isDark ? darkText : lightText
          }, { once: true })
        } catch {
          document.documentElement.style.backgroundColor = lightBackground
          document.documentElement.style.colorScheme = 'light'
          document.documentElement.style.color = lightText
        }
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
